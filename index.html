<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>职场英语笔记 | Workplace English Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --accent: #2563eb;
      --accent-light: #dbeafe;
      --accent-dark: #1d4ed8;
      --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
    }
    
    .dark {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-card: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #334155;
      --accent: #3b82f6;
      --accent-light: rgba(59, 130, 246, 0.2);
      --accent-dark: #60a5fa;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      transition: background 0.3s, color 0.3s;
    }
    
    header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;
    }
    
    .header-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
    }
    
    .logo-text h1 {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.2;
    }
    
    .logo-text p {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    
    .btn-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: none;
      background: var(--bg-primary);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .btn-icon:hover {
      background: var(--accent-light);
      color: var(--accent);
    }
    
    main {
      padding: 2rem 0;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    
    .stat-card {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: white;
      padding: 1rem;
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .stat-card.purple {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
    }
    
    .stat-card.orange {
      background: linear-gradient(135deg, #f59e0b, #ea580c);
    }
    
    .stat-info p {
      font-size: 0.75rem;
      opacity: 0.9;
    }
    
    .stat-info h3 {
      font-size: 1.5rem;
      font-weight: 700;
    }
    
    .stat-icon {
      font-size: 1.5rem;
      opacity: 0.8;
    }
    
    .search-box {
      position: relative;
      margin-bottom: 1.5rem;
    }
    
    .search-box input {
      width: 100%;
      padding: 1rem 1rem 1rem 3rem;
      border-radius: 1rem;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 1rem;
      transition: all 0.2s;
    }
    
    .search-box input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }
    
    .search-box::before {
      content: "🔍";
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.25rem;
    }
    
    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    
    .category-btn {
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      border: none;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid var(--border);
    }
    
    .category-btn:hover {
      background: var(--accent-light);
      color: var(--accent);
    }
    
    .category-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    
    .category-btn .count {
      margin-left: 0.25rem;
      opacity: 0.7;
    }
    
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    
    .section-header h2 {
      font-size: 1.125rem;
      font-weight: 600;
    }
    
    .section-header span {
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    
    .nav-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0.5rem;
    }
    
    .nav-tab {
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .nav-tab:hover {
      background: var(--bg-primary);
      color: var(--accent);
    }
    
    .nav-tab.active {
      background: var(--accent-light);
      color: var(--accent);
    }
    
    .sentence-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.5rem;
      transition: all 0.2s;
    }
    
    .sentence-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }
    
    .sentence-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    
    .sentence-text {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.6;
      flex: 1;
    }
    
    .sentence-category {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 9999px;
    }
    
    .sentence-section {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    
    .sentence-section:first-of-type {
      border-top: none;
      padding-top: 0;
    }
    
    .sentence-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .sentence-structure {
      font-family: monospace;
      font-size: 0.875rem;
      background: var(--bg-primary);
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      color: var(--text-secondary);
    }
    
    .grammar-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    
    .grammar-list li {
      padding: 0.375rem 0;
      padding-left: 1.25rem;
      position: relative;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
    
    .grammar-list li::before {
      content: "•";
      position: absolute;
      left: 0;
      color: var(--accent);
    }
    
    .sentence-meaning {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
    }
    
    .sentence-scene {
      font-size: 0.875rem;
      color: var(--text-muted);
      font-style: italic;
    }
    
    .sentence-practice {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      padding: 1rem;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      color: #92400e;
    }
    
    .dark .sentence-practice {
      background: linear-gradient(135deg, rgba(251, 191, 36, 0.2), rgba(245, 158, 11, 0.2));
      color: #fbbf24;
    }
    
    .note-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.5rem;
      transition: all 0.2s;
    }
    
    .note-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }
    
    .note-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    
    .note-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    
    .note-topic {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 9999px;
    }
    
    .note-question {
      background: var(--bg-primary);
      padding: 1rem;
      border-radius: 0.75rem;
      font-size: 0.95rem;
      color: var(--text-secondary);
      border-left: 4px solid var(--accent);
      margin-bottom: 1rem;
    }
    
    .note-question::before {
      content: "❓ ";
    }
    
    .note-content {
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 1rem;
    }
    
    .note-content p {
      margin-bottom: 0.75rem;
    }
    
    .note-content strong {
      color: var(--text-primary);
    }
    
    .note-content ul {
      margin: 0.5rem 0;
      padding-left: 1.5rem;
    }
    
    .note-content li {
      margin-bottom: 0.5rem;
    }
    
    .note-conclusion {
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      padding: 1rem;
      border-radius: 0.75rem;
      margin-bottom: 1rem;
    }
    
    .dark .note-conclusion {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(37, 99, 235, 0.2));
    }
    
    .note-conclusion-label {
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .note-examples {
      background: var(--bg-primary);
      padding: 1rem;
      border-radius: 0.75rem;
    }
    
    .note-examples-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }
    
    .note-example-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    
    .note-example-item:last-child {
      border-bottom: none;
    }
    
    .note-example-en {
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }
    
    .note-example-cn {
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    
    .word-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 1rem;
    }
    
    .word-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.5rem;
      transition: all 0.2s;
    }
    
    .word-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }
    
    .word-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    
    .word-title h3 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    
    .word-phonetic {
      font-family: monospace;
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    
    .word-category {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 9999px;
      margin-top: 0.5rem;
    }
    
    .word-actions {
      display: flex;
      gap: 0.5rem;
    }
    
    .word-actions button {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: var(--bg-primary);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
    }
    
    .word-actions button:hover {
      background: var(--accent-light);
      color: var(--accent);
    }
    
    .word-actions button.bookmarked {
      background: #fef3c7;
      color: #f59e0b;
    }
    
    .word-section {
      margin-top: 1rem;
    }
    
    .word-section-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }
    
    .word-meaning {
      color: var(--text-secondary);
    }
    
    .word-example {
      color: var(--text-muted);
      font-style: italic;
    }
    
    .word-note {
      font-size: 0.875rem;
      color: var(--text-muted);
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      margin-top: 0.75rem;
    }
    
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
    }
    
    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }
    
    .empty-state h3 {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    
    .empty-state p {
      color: var(--text-muted);
    }
    
    footer {
      border-top: 1px solid var(--border);
      margin-top: 4rem;
      padding: 2rem 0;
      text-align: center;
    }
    
    footer p {
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    
    @media (max-width: 768px) {
      .stats {
        grid-template-columns: 1fr;
      }
      
      .word-grid {
        grid-template-columns: 1fr;
      }
      
      .categories {
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 0.5rem;
        -webkit-overflow-scrolling: touch;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-content">
        <div class="logo">
          <div class="logo-icon">📚</div>
          <div class="logo-text">
            <h1>职场英语笔记</h1>
            <p>Workplace English Notes</p>
          </div>
        </div>
        <button class="btn-icon" onclick="toggleTheme()" id="themeBtn">🌙</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-info">
          <p>总词条</p>
          <h3 id="totalWords">0</h3>
        </div>
        <span class="stat-icon">📖</span>
      </div>
      <div class="stat-card purple">
        <div class="stat-info">
          <p>分类</p>
          <h3 id="totalCategories">0</h3>
        </div>
        <span class="stat-icon">🏷️</span>
      </div>
      <div class="stat-card orange">
        <div class="stat-info">
          <p>收藏</p>
          <h3 id="totalBookmarks">0</h3>
        </div>
        <span class="stat-icon">⭐</span>
      </div>
    </div>

    <div class="nav-tabs">
      <button class="nav-tab active" id="wordsTab" onclick="switchTab('words')">
        📚 单词/词组
      </button>
      <button class="nav-tab" id="sentencesTab" onclick="switchTab('sentences')">
        📝 句式解析
      </button>
      <button class="nav-tab" id="notesTab" onclick="switchTab('notes')">
        📋 笔记卡片
      </button>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索单词、词组或含义..." oninput="handleSearch()">
    </div>

    <div class="categories" id="categories"></div>

    <div class="section-header">
      <h2 id="sectionTitle">全部词条</h2>
      <span id="resultCount">共 0 条</span>
    </div>

    <div class="word-grid" id="wordList"></div>
  </main>

  <footer>
    <div class="container">
      <p>Workplace English Notes · 职场英语笔记</p>
    </div>
  </footer>

  <script>
    const wordsData = [
      { id: '1', term: 'duration', phonetic: '/dʊˈreɪʃn/', meaning: '持续时间', example: 'The duration of the project is three months.', note: '项目周期、会议时长', category: '项目/任务管理' },
      { id: '2', term: 'kick off', phonetic: '/kɪk ɔːf/', meaning: '启动', example: "Let's kick off the meeting at 2 PM.", note: '项目启动、会议开始', category: '项目/任务管理' },
      { id: '3', term: 'take over', phonetic: '/teɪk ˈoʊvər/', meaning: '接管、接手', example: 'I just took over this account from Sarah.', note: '工作交接场景，可接 project/account/task/position', category: '项目/任务管理' },
      { id: '4', term: 'enhancement', phonetic: '/ɪnˈhænsmənt/', meaning: '增强、改进', example: 'This is a feature enhancement request.', note: '功能改进、优化', category: '项目/任务管理' },
      { id: '5', term: 'data validation', phonetic: '/ˈdeɪtə vælɪˈdeɪʃn/', meaning: '数据验证', example: 'We need to add data validation for this field.', note: '技术场景常用', category: '项目/任务管理' },
      { id: '6', term: 'discrepancy', phonetic: '/dɪˈskrepənsi/', meaning: '差异、不符', example: "There's a discrepancy between the two reports.", note: '数据核对、审计场景常用', category: '项目/任务管理' },
      { id: '7', term: 'procedure', phonetic: '/prəˈsiːdʒər/', meaning: '程序、流程、步骤', example: 'Please follow the standard operating procedure.', note: 'SOP = Standard Operating Procedure；formal procedure 正式程序', category: '项目/任务管理' },
      { id: '8', term: 'state', phonetic: '/steɪt/', meaning: '陈述、说明；状态', example: 'Please state your reasons for the delay.', note: '动词用法较正式；current state 当前状态；in a good state 状态良好', category: '项目/任务管理' },
      { id: '9', term: 'attendee', phonetic: '/əˌtenˈdiː/', meaning: '参会者、出席者', example: 'All attendees should receive the meeting invite.', note: '正式用词，participant 更通用', category: '会议讨论' },
      { id: '10', term: 'attendance', phonetic: '/əˈtendəns/', meaning: '出席、出勤', example: 'Your attendance is required at the quarterly review.', note: 'take attendance 点名；attendance rate 出勤率', category: '会议讨论' },
      { id: '11', term: 'absent', phonetic: '/ˈæbsənt/ adj. /æbˈsent/ v.', meaning: '缺席的；缺席', example: 'Three team members were absent from the meeting.', note: '反义词：present；absent from 缺席...', category: '会议讨论' },
      { id: '12', term: 'present', phonetic: '/ˈpreznt/ adj./n. /prɪˈzent/ v.', meaning: '出席的；礼物；呈现', example: "All managers are present today. / I'll present the findings tomorrow.", note: '作动词时重音在第二音节；present a proposal 提交方案', category: '会议讨论' },
      { id: '13', term: 'insist', phonetic: '/ɪnˈsɪst/', meaning: '坚持、坚决要求', example: 'I must insist that we follow the standard procedure.', note: '语气较强；insist on + doing；insist that + 从句', category: '会议讨论' },
      { id: '14', term: 'poll', phonetic: '/poʊl/', meaning: '投票、民意调查', example: "Let's take a quick poll to decide on the meeting time.", note: '可作动词或名词；conduct a poll 进行投票', category: '会议讨论' },
      { id: '15', term: 'in the past', phonetic: '/ɪn ðə pæst/', meaning: '在过去', example: 'In the past, we used a different system.', note: '与现在完成时或过去时连用；注意：英式英语中常与现在完成时连用', category: '时间表达' },
      { id: '16', term: 'critical', phonetic: '/ˈkrɪtɪkl/', meaning: '关键的、至关重要的；批判性的', example: 'This is a critical issue that needs immediate attention.', note: 'critical path 关键路径；critical thinking 批判性思维；语气比 important 更强', category: '项目/任务管理' },
      { id: '17', term: 'concern', phonetic: '/kənˈsɜːrn/', meaning: '担忧、顾虑；涉及', example: 'I have some concerns about the project timeline.', note: 'raise/express concern 提出顾虑；main concern 主要关注点；concern about/over 对...的担忧', category: '会议讨论' },
      { id: '18', term: 'mitigate', phonetic: '/ˈmɪtɪɡeɪt/', meaning: '缓解、减轻、降低', example: 'We need to mitigate the risks before proceeding.', note: 'mitigate risks 缓解风险；常与 risk/damage/loss/issue 搭配；比 reduce 更正式', category: '项目/任务管理' },
      { id: '19', term: 'inflate', phonetic: '/ɪnˈfleɪt/', meaning: '使膨胀；使通货膨胀；夸大', example: 'The numbers were inflated to make the project look more successful.', note: 'inflate prices 抬高价格；inflated ego 膨胀的自我；inflation n. 通货膨胀', category: '项目/任务管理' },
      { id: '20', term: 'capacity', phonetic: '/kəˈpæsəti/', meaning: '容量；能力；产能', example: 'We are currently operating at full capacity.', note: 'at full capacity 满负荷运转；production capacity 产能；workload capacity 工作负载能力', category: '项目/任务管理' },
      { id: '21', term: 'escalate', phonetic: '/ˈeskəleɪt/', meaning: '升级、上报（问题/工单）', example: 'This issue needs to be escalated to the senior management.', note: 'escalate to 上报给...；escalation n. 升级；常用于工单升级、问题上报', category: '项目/任务管理' }
    ];

    const sentenceData = [
      {
        id: 's1',
        sentence: "I just took over this account from Sarah.",
        structure: "主语 + 时间状语 + 谓语短语 + 宾语 + 来源状语",
        grammar: [
          "现在完成时：have/has + 过去分词 (just 表示刚刚完成)",
          "take over 动词短语：接管、接手",
          "from + 人名：表示从某人那里接手"
        ],
        meaning: "我刚从莎拉那里接手了这个账户。",
        scene: "工作交接场景，向他人说明自己刚接手某个项目/账户/任务",
        practice: "替换：I just took over [this project/account/position] from [同事名字].",
        category: "任务交接"
      },
      {
        id: 's2',
        sentence: "We need to mitigate the risks before proceeding.",
        structure: "主语 + 谓语 + 不定式短语 + 时间状语从句",
        grammar: [
          "need to do sth.：需要做某事",
          "mitigate：及物动词，降低、缓解（正式用语）",
          "before + doing：在做...之前"
        ],
        meaning: "在继续推进之前，我们需要先降低风险。",
        scene: "项目管理中，强调风险控制的重要性，通常在启动新项目或变更前使用",
        practice: "替换：We need to mitigate [the issues/challenges/problems] before [moving forward/launching].",
        category: "项目/任务管理"
      },
      {
        id: 's3',
        sentence: "I have some concerns about the project timeline.",
        structure: "主语 + 谓语 + 宾语 + 介词短语",
        grammar: [
          "have concerns about：对...有顾虑/担忧（礼貌表达）",
          "some：用于缓和语气，比直接说 'I have concerns' 更委婉",
          "timeline：时间线、进度安排"
        ],
        meaning: "我对项目的时间安排有一些顾虑。",
        scene: "会议或邮件中，委婉地提出对某个计划或方案的不同意见",
        practice: "替换：I have some concerns about [the budget/resources/approach].",
        category: "会议讨论"
      },
      {
        id: 's4',
        sentence: "It doesn't appear to be a system issue.",
        structure: "形式主语 It + 否定谓语 + appear to be + 表语",
        grammar: [
          "appear to be：看起来/似乎是，委婉表达",
          "doesn't appear to be：委婉否定，比 'is not' 更客气",
          "It 作形式主语，避免直接断言"
        ],
        meaning: "这似乎不是系统问题。/ 看起来不像是系统层面的问题。",
        scene: "技术排查、问题分析时，委婉地排除某种可能性，避免直接下结论",
        practice: "替换：It doesn't appear to be [a bug/a network problem/a data issue].",
        category: "项目/任务管理"
      },
      {
        id: 's5',
        sentence: "I can confirm that the team are aware and are currently investigating this as a priority.",
        structure: "主语 + 谓语 + that 宾语从句（包含并列谓语）",
        grammar: [
          "I can confirm that...：正式确认信息的常用句式",
          "the team are aware：英式英语集合名词可用复数动词",
          "investigate：及物动词，直接接宾语（不需要 into）",
          "as a priority：作为优先事项"
        ],
        meaning: "我可以确认团队已知晓此事，目前正在优先调查。",
        scene: "客服回复、邮件更新、问题跟进时，向相关方确认处理状态",
        practice: "替换：I can confirm that [we have received your request/this has been escalated/the issue is being fixed].",
        category: "邮件沟通"
      }
    ];

    const noteData = [
      {
        id: 'n1',
        title: 'whether vs if',
        topic: '语法对比',
        question: 'whether 和 if 在职场英语中哪个更常用？',
        content: `<p><strong>核心区别：</strong></p>
        <p><strong>if</strong> 更口语化，<strong>whether</strong> 更正式。在职场商务场景中，<strong>whether 更常用</strong>，显得更专业。</p>
        
        <p><strong>只能用 whether 的情况：</strong></p>
        <ul>
          <li>与 <strong>or not</strong> 连用：I don't know whether or not he'll come.</li>
          <li>介词后：It depends on whether we have enough time.</li>
          <li>不定式前：I can't decide whether to accept the offer.</li>
          <li>主语从句放句首：Whether he will join us is still uncertain.</li>
        </ul>
        
        <p><strong>两者都可用的情况：</strong></p>
        <ul>
          <li>引导宾语从句：I wonder if/whether they will agree.</li>
        </ul>`,
        conclusion: '职场写作和正式场合优先使用 whether，显得更专业；口语交流可用 if。',
        examples: [
          { en: "Please let me know whether you need any clarification.", cn: "请告知您是否需要任何澄清。（正式邮件）" },
          { en: "We need to determine whether the timeline is feasible.", cn: "我们需要确认时间线是否可行。（会议）" },
          { en: "I'm not sure if this is the right approach.", cn: "我不确定这是否是正确的方法。（口语/非正式）" }
        ],
        category: "语法"
      }
    ];

    const categories = ['全部', '项目/任务管理', '会议讨论', '时间表达', '邮件沟通', '工作汇报', '日常沟通'];
    const sentenceCategories = ['全部', '任务交接', '项目/任务管理', '会议讨论', '邮件沟通', '工作汇报'];
    const noteCategories = ['全部', '语法', '用法', '场景', '技巧'];
    
    let selectedCategory = '全部';
    let selectedSentenceCategory = '全部';
    let selectedNoteCategory = '全部';
    let searchQuery = '';
    let bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');
    let currentTab = 'words';

    function init() {
      renderCategories();
      filterWords();
      updateStats();
      loadTheme();
    }

    function switchTab(tab) {
      currentTab = tab;
      
      // 更新标签样式
      document.getElementById('wordsTab').classList.toggle('active', tab === 'words');
      document.getElementById('sentencesTab').classList.toggle('active', tab === 'sentences');
      document.getElementById('notesTab').classList.toggle('active', tab === 'notes');
      
      // 更新搜索框提示
      const searchInput = document.getElementById('searchInput');
      if (tab === 'words') {
        searchInput.placeholder = '搜索单词、词组或含义...';
      } else if (tab === 'sentences') {
        searchInput.placeholder = '搜索句子、句型或场景...';
      } else {
        searchInput.placeholder = '搜索笔记主题、问题或内容...';
      }
      
      // 更新分类
      selectedCategory = '全部';
      selectedSentenceCategory = '全部';
      selectedNoteCategory = '全部';
      renderCategories();
      
      // 重新渲染
      if (tab === 'words') {
        filterWords();
        document.getElementById('sectionTitle').textContent = '全部词条';
      } else if (tab === 'sentences') {
        filterSentences();
        document.getElementById('sectionTitle').textContent = '全部句式';
      } else {
        filterNotes();
        document.getElementById('sectionTitle').textContent = '全部笔记';
      }
    }

    function handleSearch() {
      if (currentTab === 'words') {
        filterWords();
      } else if (currentTab === 'sentences') {
        filterSentences();
      } else {
        filterNotes();
      }
    }

    function renderCategories() {
      const container = document.getElementById('categories');
      let cats, counts, selected;
      
      if (currentTab === 'words') {
        cats = categories;
        counts = getCategoryCounts();
        selected = selectedCategory;
      } else if (currentTab === 'sentences') {
        cats = sentenceCategories;
        counts = getSentenceCategoryCounts();
        selected = selectedSentenceCategory;
      } else {
        cats = noteCategories;
        counts = getNoteCategoryCounts();
        selected = selectedNoteCategory;
      }
      
      container.innerHTML = cats.map(cat => `
        <button class="category-btn ${selected === cat ? 'active' : ''}" onclick="selectCategory('${cat}')">
          ${cat}
          ${cat !== '全部' ? `<span class="count">${counts[cat] || 0}</span>` : ''}
        </button>
      `).join('');
    }

    function getSentenceCategoryCounts() {
      const counts = {};
      sentenceData.forEach(s => {
        counts[s.category] = (counts[s.category] || 0) + 1;
      });
      return counts;
    }

    function getNoteCategoryCounts() {
      const counts = {};
      noteData.forEach(n => {
        counts[n.category] = (counts[n.category] || 0) + 1;
      });
      return counts;
    }

    function selectCategory(cat) {
      if (currentTab === 'words') {
        selectedCategory = cat;
        renderCategories();
        filterWords();
        document.getElementById('sectionTitle').textContent = cat === '全部' ? '全部词条' : cat;
      } else if (currentTab === 'sentences') {
        selectedSentenceCategory = cat;
        renderCategories();
        filterSentences();
        document.getElementById('sectionTitle').textContent = cat === '全部' ? '全部句式' : cat;
      } else {
        selectedNoteCategory = cat;
        renderCategories();
        filterNotes();
        document.getElementById('sectionTitle').textContent = cat === '全部' ? '全部笔记' : cat;
      }
    }

    function filterSentences() {
      searchQuery = document.getElementById('searchInput').value.toLowerCase();
      
      const filtered = sentenceData.filter(s => {
        const matchesSearch = !searchQuery || 
          s.sentence.toLowerCase().includes(searchQuery) ||
          s.meaning.toLowerCase().includes(searchQuery) ||
          s.structure.toLowerCase().includes(searchQuery) ||
          s.scene.toLowerCase().includes(searchQuery);
        
        const matchesCategory = selectedSentenceCategory === '全部' || s.category === selectedSentenceCategory;
        
        return matchesSearch && matchesCategory;
      });
      
      renderSentences(filtered);
      document.getElementById('resultCount').textContent = `共 ${filtered.length} 条`;
    }

    function renderSentences(sentences) {
      const container = document.getElementById('wordList');
      
      if (sentences.length === 0) {
        container.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <div class="empty-state-icon">📝</div>
            <h3>没有找到相关句式</h3>
            <p>试试其他关键词或分类</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = sentences.map(s => `
        <div class="sentence-card">
          <div class="sentence-header">
            <div class="sentence-text">"${s.sentence}"</div>
            <div style="display:flex;gap:0.5rem;align-items:flex-start;">
              <span class="sentence-category">${s.category}</span>
              <button onclick="speak('${s.sentence.replace(/'/g, "\\'")}')" style="width:32px;height:32px;border-radius:8px;border:none;background:var(--bg-primary);color:var(--text-muted);cursor:pointer;font-size:1rem;transition:all 0.2s;" title="播放句子">🔊</button>
            </div>
          </div>
          
          <div class="sentence-section">
            <div class="sentence-label">📐 句型结构</div>
            <div class="sentence-structure">${s.structure}</div>
          </div>
          
          <div class="sentence-section">
            <div class="sentence-label">📖 语法要点</div>
            <ul class="grammar-list">
              ${s.grammar.map(g => `<li>${g}</li>`).join('')}
            </ul>
          </div>
          
          <div class="sentence-section">
            <div class="sentence-label">💡 中文含义</div>
            <div class="sentence-meaning">${s.meaning}</div>
          </div>
          
          <div class="sentence-section">
            <div class="sentence-label">🎯 使用场景</div>
            <div class="sentence-scene">${s.scene}</div>
          </div>
          
          <div class="sentence-section" style="border-top:none;padding-top:0.5rem;">
            <div class="sentence-practice">
              <strong>✏️ 替换练习：</strong>${s.practice}
            </div>
          </div>
        </div>
      `).join('');
    }

    function filterNotes() {
      searchQuery = document.getElementById('searchInput').value.toLowerCase();
      
      const filtered = noteData.filter(n => {
        const matchesSearch = !searchQuery || 
          n.title.toLowerCase().includes(searchQuery) ||
          n.question.toLowerCase().includes(searchQuery) ||
          n.content.toLowerCase().includes(searchQuery) ||
          n.conclusion.toLowerCase().includes(searchQuery);
        
        const matchesCategory = selectedNoteCategory === '全部' || n.category === selectedNoteCategory;
        
        return matchesSearch && matchesCategory;
      });
      
      renderNotes(filtered);
      document.getElementById('resultCount').textContent = `共 ${filtered.length} 条`;
    }

    function renderNotes(notes) {
      const container = document.getElementById('wordList');
      
      if (notes.length === 0) {
        container.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <div class="empty-state-icon">📋</div>
            <h3>没有找到相关笔记</h3>
            <p>试试其他关键词或分类</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = notes.map(n => `
        <div class="note-card">
          <div class="note-header">
            <div class="note-title">${n.title}</div>
            <span class="note-topic">${n.topic}</span>
          </div>
          
          <div class="note-question">${n.question}</div>
          
          <div class="note-content">${n.content}</div>
          
          <div class="note-conclusion">
            <div class="note-conclusion-label">💡 核心建议</div>
            <div>${n.conclusion}</div>
          </div>
          
          <div class="note-examples">
            <div class="note-examples-label">例句参考</div>
            ${n.examples.map(ex => `
              <div class="note-example-item">
                <div class="note-example-en">${ex.en}</div>
                <div class="note-example-cn">${ex.cn}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }


    function getCategoryCounts() {
      const counts = {};
      wordsData.forEach(w => {
        counts[w.category] = (counts[w.category] || 0) + 1;
      });
      return counts;
    }

    function filterWords() {
      searchQuery = document.getElementById('searchInput').value.toLowerCase();
      
      const filtered = wordsData.filter(w => {
        const matchesSearch = !searchQuery || 
          w.term.toLowerCase().includes(searchQuery) ||
          w.meaning.toLowerCase().includes(searchQuery) ||
          w.example.toLowerCase().includes(searchQuery) ||
          w.note.toLowerCase().includes(searchQuery);
        
        const matchesCategory = selectedCategory === '全部' || w.category === selectedCategory;
        
        return matchesSearch && matchesCategory;
      });
      
      renderWords(filtered);
      document.getElementById('resultCount').textContent = `共 ${filtered.length} 条`;
    }

    function renderWords(words) {
      const container = document.getElementById('wordList');
      
      if (words.length === 0) {
        container.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <div class="empty-state-icon">📚</div>
            <h3>没有找到相关词条</h3>
            <p>试试其他关键词或分类</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = words.map(word => `
        <div class="word-card">
          <div class="word-header">
            <div class="word-title">
              <h3>${word.term}</h3>
              <span class="word-phonetic">${word.phonetic}</span>
              <span class="word-category">${word.category}</span>
            </div>
            <div class="word-actions">
              <button onclick="speak('${word.term.replace(/'/g, "\\'")}')" title="播放发音">🔊</button>
              <button onclick="toggleBookmark('${word.id}')" class="${bookmarks.includes(word.id) ? 'bookmarked' : ''}" title="收藏">⭐</button>
            </div>
          </div>
          <div class="word-section">
            <div class="word-section-label">含义</div>
            <div class="word-meaning">${word.meaning}</div>
          </div>
          <div class="word-section">
            <div class="word-section-label" style="display:flex;align-items:center;gap:0.5rem;">
              例句
              <button onclick="speak('${word.example.replace(/'/g, "\\'")}')" style="width:20px;height:20px;border-radius:4px;border:none;background:var(--bg-primary);color:var(--text-muted);cursor:pointer;font-size:0.75rem;transition:all 0.2s;" title="播放例句">🔊</button>
            </div>
            <div class="word-example">"${word.example}"</div>
          </div>
          ${word.note ? `
          <div class="word-note">
            <strong>备注：</strong>${word.note}
          </div>
          ` : ''}
        </div>
      `).join('');
    }

    function speak(text) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      speechSynthesis.speak(utterance);
    }

    function toggleBookmark(id) {
      if (bookmarks.includes(id)) {
        bookmarks = bookmarks.filter(b => b !== id);
      } else {
        bookmarks.push(id);
      }
      localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
      filterWords();
      updateStats();
    }

    function updateStats() {
      const totalItems = wordsData.length + sentenceData.length + noteData.length;
      document.getElementById('totalWords').textContent = totalItems;
      document.getElementById('totalCategories').textContent = categories.length - 1;
      document.getElementById('totalBookmarks').textContent = bookmarks.length;
    }

    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('darkMode', isDark);
      document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
    }

    function loadTheme() {
      const isDark = localStorage.getItem('darkMode') === 'true' || 
        (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (isDark) {
        document.documentElement.classList.add('dark');
        document.getElementById('themeBtn').textContent = '☀️';
      }
    }

    init();
  </script>
</body>
</html>
